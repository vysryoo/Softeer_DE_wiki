version: '3.8'

services:
  spark-master:
    build: .
    container_name: spark-master
    command: bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

  spark-worker-1:
    build: .
    container_name: spark-worker-1
    depends_on:
      - spark-master
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2G

  spark-worker-2:
    build: .
    container_name: spark-worker-2
    depends_on:
      - spark-master
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8082:8081"
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2G
